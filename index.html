<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width" initial-scale="1.0">

    <!--Hoja de estilos-->
    <link rel="stylesheet" type="text/css" href="styles.css">
    <!--Font Aweasome-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <title>Google</title>

</head>

<body>

    <header>
        <div class="header-izquierda">
            <a href="https://about.google/?fg=1&utm_source=google-ES&utm_medium=referral&utm_campaign=hp-header"
                target="_blank" class="enlace" rel="noopener noreferrer">Sobre Google</a>
            <a href="https://store.google.com/es/?utm_source=hp_header&utm_medium=google_ooo&utm_campaign=GS100042&hl=es&pli=1"
                class="enlace" target="_blank" rel="noopener noreferrer">Tienda</a>
        </div>
        <div class="header-derecha">
            <a href="https://mail.google.com/mail/" class="enlace" target="_blank" rel="noopener noreferrer">Gmail</a>
            <a href="https://www.google.com/imghp?hl=es&ogbl" class="enlace" target="_blank"
                rel="noopener noreferrer">Imágenes</a>
            <i class="fa-solid fa-bars"></i>
            <img src="imagenes/IMG_9558.jpeg" alt="yo" width="40" height="40">
        </div>
    </header>

    <main>
        <img src="imagenes/SCR-20260401-tnzk.png" alt="logo google">
        <div class="cuadro-busqueda">
            <i class="fa-solid fa-plus" id="cruz"></i>
            <input type="text" class="mi-input">
            <i class="fa-solid fa-microphone" id="microfono"></i>
            <i class="fa-solid fa-camera" id="camara"></i>
            <div class="modoIA">
                <i class="fa-solid fa-magnifying-glass" id="lupa"></i>
                <p>Modo IA</p>
            </div>
        </div>
        <div class="botones-busqueda">
            <button>Buscar con Google</button>
            <button>Voy a tener suerte</button>
        </div>
        <div class="idiomas">
            <p>Ofrecido por Google en: </p>
            <a href="" class="enlace-idiomas" target="_blank" rel="noopener noreferrer">català</a>
            <a href="" class="enlace-idiomas" target="_blank" rel="noopener noreferrer">galego</a>
            <a href="" class="enlace-idiomas" target="_blank" rel="noopener noreferrer">euskara</a>
        </div>
    </main>

    <footer>
        <div class="footer-arriba">
            <p>España</p>
        </div>
        <div class="footer-abajo">
            <div class="footer-abajo-izquierda">
                <a href="https://business.google.com/es/google-ads/?subid=ww-ww-et-g-awa-a-g_hpafoot1_1!o2&utm_source=google.com&utm_medium=referral&utm_campaign=google_hpafooter&fg=1"
                    class="enlace" target="_blank" rel="noopener noreferrer">Publicidad</a>
                <a href="https://business.google.com/es/business-profile/?subid=ww-ww-et-g-awa-a-g_hpbfoot1_1!o2&utm_source=google.com&utm_medium=referral&utm_campaign=google_hpbfooter&fg=1"
                    class="enlace" target="_blank" rel="noopener noreferrer">Empresas</a>
                <a href="https://www.google.com/search/howsearchworks/?fg=1" class="enlace" target="_blank"
                    rel="noopener noreferrer">Como funciona la búsqueda</a>
            </div>
            <div class="footer-abajo-centro">
                <i class="fa-solid fa-leaf"></i>
                <a href="https://sustainability.google/intl/es_es/?utm_source=googlehpfooter&utm_medium=housepromos&utm_campaign=bottom-footer&utm_content="
                    class="enlace" target="_blank" rel="noopener noreferrer">Tres décadas de acción climática: Descubre
                    lo que estamos haciendo</a>
            </div>
            <div class="footer-abajo-derecha">
                <a href="https://policies.google.com/privacy?hl=es&fg=1" class="enlace" target="_blank"
                    rel="noopener noreferrer">Privacidad</a>
                <a href="https://policies.google.com/terms?hl=es&fg=1" class="enlace" target="_blank"
                    rel="noopener noreferrer">Términos</a>
                <a href="" class="enlace" target="_blank" rel="noopener noreferrer">Configuración</a>
            </div>
        </div>

    </footer>

</body>

</html>
